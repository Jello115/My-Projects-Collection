<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" class="theme-but">Switch Theme</button>
    <div class="card">
        <div class="card-title">
            <h1>Happy Birthday!</h1>
        </div>
        <div class="cake-section">
            <div class="Plate"></div>
            <div class="layer1"></div>
            <div class="layer2"></div>
            <div class="layer3"></div>
            <div class="Topping">
                <div class="circle1"></div>
                <div class="circle2"></div>
                <div class="circle3"></div>
                <div class="circle4"></div>
                <div class="circle5"></div>
                <div class="decoration1"></div>
                <div class="decoration2"></div>
                <div class="decoration3"></div>
                <div class="decoration4"></div>
                <div class="decoration5"></div>
            </div>
            <div class="candle1"><div class="fire1"></div></div>
            <div class="candle2"><div class="fire2"></div></div>
            <div class="candle3"><div class="fire3"></div></div>
            <div class="candle4"><div class="fire4"></div></div>
            <div class="shadow"></div>
            <div id="darker" class="shadow"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
